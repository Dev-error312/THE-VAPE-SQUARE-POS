<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Karobar</title>

    <!--
      Anti-flicker script (FOWT prevention).
      Runs synchronously before React loads — reads theme from localStorage
      and immediately applies the correct class to <html>.
      Default is 'dark' to match the app's design.
    -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme') || 'system';
          var prefersDark =
            t === 'dark' ||
            (t === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (prefersDark) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {
          // localStorage blocked (private mode) — default to dark
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
